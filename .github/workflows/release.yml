name: Release

on:
  push:
    branches: [master]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # semantic-release pushes a release commit + tag
      issues: write # @semantic-release/github comments on referenced issues
      pull-requests: write # @semantic-release/github comments on referenced PRs
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history to read commits since the last release

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # see ci.yml -- @oauth-spa-kit/nuxt's tsconfig.json references the
      # playground's generated .nuxt/tsconfig.*.json for #imports to resolve.
      - run: pnpm --filter=@oauth-spa-kit/nuxt run dev:prepare

      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test

      - run: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
