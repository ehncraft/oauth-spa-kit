name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # see ci.yml -- @oauth-spa-kit/nuxt's tsconfig.json references the
      # playground's generated .nuxt/tsconfig.*.json for #imports to resolve.
      - run: pnpm --filter=@oauth-spa-kit/nuxt run dev:prepare

      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test

      - run: pnpm run publish:packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
