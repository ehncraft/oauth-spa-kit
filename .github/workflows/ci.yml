name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # version comes from package.json's "packageManager" field

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # @oauth-spa-kit/nuxt's runtime files import Nuxt's virtual `#imports`
      # module, which only resolves inside a real Nuxt app after `nuxi
      # prepare` generates its .nuxt/tsconfig.*.json -- this runs that
      # against packages/nuxt/playground so `pnpm typecheck` (which the
      # nuxt package's own tsconfig.json now references) has something to
      # check against, the same way nuxt-auth-utils' own CI does.
      - run: pnpm --filter=@oauth-spa-kit/nuxt run dev:prepare

      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
