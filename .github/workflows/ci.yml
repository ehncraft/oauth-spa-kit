name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Builds all 4 packages, including @oauth-spa-kit/nuxt via its real
      # build tool (nuxt-module-build, which stubs Nuxt's auto-imports
      # itself). Typecheck is scoped to core/server/react only -- the nuxt
      # package's runtime files import Nuxt's virtual `#imports` module,
      # which only resolves inside a real Nuxt app after `nuxi prepare`
      # (see the README's Status section, verified against how
      # nuxt-auth-utils itself handles the same limitation).
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
